<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>My Portfolio Dashboard</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0a0a0a;color:#fff;min-height:100vh}
#root{max-width:900px;margin:0 auto;padding:1.5rem 1rem}
input,select{font-family:inherit;font-size:13px;color:#fff;background:#1a1a1a;border:1px solid #2a2a2a;border-radius:8px;padding:8px 12px;outline:none;transition:border-color .15s}
input:focus,select:focus{border-color:rgb(50,215,45)}
button{font-family:inherit;cursor:pointer;transition:opacity .15s}
button:active{opacity:0.75}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div id="root"><p style="padding:2rem;color:#666">Loading…</p></div>
<script type="text/babel">
const {useState,useEffect,useRef,useCallback}=React;
const CURRENCIES=["USD","MYR","SGD"];
const ASSET_TYPES=["Stocks","Crypto","ETF/Funds","Real Estate","Cash","Bonds","Provident Fund","Other"];
const TAGS=["Growth","Dividend","Emergency Fund","Speculative","Stable","Retirement","Short-term"];
const DEFAULT_MYR=4.000;
const DEFAULT_SGD=1.35;
const SK="pfDashV7";
const FINNHUB_KEY="d868ovhr01qnvdehfuhgd868ovhr01qnvdehfui0";
const GREEN="rgb(50,215,45)";
const GREEN_DIM="rgba(50,215,45,0.12)";
const GREEN_BORDER="rgba(50,215,45,0.35)";
const RED="#ff453a";
const BLUE="#0A84FF";
const S={bg:"#0a0a0a",card:"#111",cardBorder:"#1e1e1e",text:"#fff",textDim:"#888",textFaint:"#333",input:"#1a1a1a",inputBorder:"#2a2a2a"};
const card={background:S.card,border:`1px solid ${S.cardBorder}`,borderRadius:12,padding:"1.25rem"};
const iS={background:S.input,border:`1px solid ${S.inputBorder}`,borderRadius:8,padding:"8px 12px",fontSize:13,color:S.text,width:"100%",boxSizing:"border-box",outline:"none",fontFamily:"inherit"};
const bP={background:GREEN_DIM,color:GREEN,border:`1px solid ${GREEN_BORDER}`,borderRadius:8,padding:"7px 16px",fontSize:13,cursor:"pointer",fontFamily:"inherit",fontWeight:500};
const bG={background:"transparent",color:S.textDim,border:`1px solid ${S.inputBorder}`,borderRadius:8,padding:"7px 16px",fontSize:13,cursor:"pointer",fontFamily:"inherit"};
const bD={background:"rgba(255,69,58,0.1)",color:RED,border:"1px solid rgba(255,69,58,0.3)",borderRadius:8,padding:"7px 16px",fontSize:13,cursor:"pointer",fontFamily:"inherit"};

const toUSD=(a,c,myr,sgd)=>c==="MYR"?a/(myr||DEFAULT_MYR):c==="SGD"?a/(sgd||DEFAULT_SGD):a;
const fmtC=(n,c="USD")=>(c==="USD"?"$":c==="MYR"?"RM":"S$")+Math.abs(n).toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2});
const pct=n=>(n>=0?"+":"")+n.toFixed(2)+"%";
const COLORS=["#32D72D","#0A84FF","#FF9F0A","#FF453A","#BF5AF2","#64D2FF","#FFD60A","#30D158"];
const EMPTY_H={name:"",type:"Stocks",currency:"USD",purchasePrice:"",currentPrice:"",quantity:"",tag:"Growth",note:"",ticker:""};
const EMPTY_Y={assetName:"",principal:"",currency:"USD",apr:"",durationDays:"",startDate:new Date().toISOString().slice(0,10),rewardAsset:"",rewardAssetType:"Crypto",rewardCurrency:"USD",tag:"Growth",note:""};

const BURSA_STOCKS=[
  {name:"Maybank",ticker:"KLSE:1155"},{name:"CIMB Group",ticker:"KLSE:1023"},
  {name:"Public Bank",ticker:"KLSE:1295"},{name:"Tenaga Nasional",ticker:"KLSE:5347"},
  {name:"IHH Healthcare",ticker:"KLSE:5225"},{name:"Petronas Gas",ticker:"KLSE:6033"},
  {name:"Petronas Chemicals",ticker:"KLSE:5183"},{name:"Maxis",ticker:"KLSE:6012"},
  {name:"Axiata",ticker:"KLSE:6888"},{name:"CelcomDigi",ticker:"KLSE:6947"},
  {name:"Press Metal",ticker:"KLSE:8869"},{name:"Top Glove",ticker:"KLSE:7113"},
  {name:"Hartalega",ticker:"KLSE:5168"},{name:"IOI Corp",ticker:"KLSE:1961"},
  {name:"Sime Darby",ticker:"KLSE:4197"},{name:"Sime Darby Plantation",ticker:"KLSE:5285"},
  {name:"Genting",ticker:"KLSE:3182"},{name:"Genting Malaysia",ticker:"KLSE:4715"},
  {name:"Hong Leong Bank",ticker:"KLSE:5819"},{name:"Hong Leong Financial",ticker:"KLSE:1082"},
  {name:"RHB Bank",ticker:"KLSE:1066"},{name:"MISC",ticker:"KLSE:3816"},
  {name:"PPB Group",ticker:"KLSE:4065"},{name:"Kuala Lumpur Kepong",ticker:"KLSE:2445"},
  {name:"Dialog Group",ticker:"KLSE:7277"},{name:"Telekom Malaysia",ticker:"KLSE:4863"},
  {name:"Mr DIY",ticker:"KLSE:5296"},{name:"CTOS Digital",ticker:"KLSE:5301"},
  {name:"Inari Amertron",ticker:"KLSE:0166"},{name:"Malaysia Airports",ticker:"KLSE:5014"},
];

const CRYPTO_MAP={btc:"bitcoin",eth:"ethereum",sol:"solana",bnb:"binancecoin",xrp:"ripple",ada:"cardano",doge:"dogecoin",dot:"polkadot",matic:"matic-network",avax:"avalanche-2",link:"chainlink",ltc:"litecoin",uni:"uniswap",atom:"cosmos",xlm:"stellar",algo:"algorand",near:"near",ftm:"fantom",sand:"the-sandbox",mana:"decentraland",usdt:"tether",usdc:"usd-coin",shib:"shiba-inu",trx:"tron"};

function Lbl({children}){return <p style={{margin:"0 0 5px",fontSize:11,color:S.textDim,textTransform:"uppercase",letterSpacing:"0.06em",fontWeight:500}}>{children}</p>;}

function Pie({data}){
  const sz=180,cx=90,cy=90,r=65,ir=36;let angle=-Math.PI/2;
  const total=data.reduce((s,d)=>s+d.value,0);
  if(!total) return <div style={{textAlign:"center",color:S.textDim,fontSize:13,padding:"2rem"}}>No holdings</div>;
  return(
    <svg viewBox={`0 0 ${sz} ${sz}`} width={sz} height={sz}>
      {data.map((d,i)=>{
        const a=(d.value/total)*2*Math.PI;
        const x1=cx+r*Math.cos(angle),y1=cy+r*Math.sin(angle),x2=cx+r*Math.cos(angle+a),y2=cy+r*Math.sin(angle+a);
        const xi1=cx+ir*Math.cos(angle),yi1=cy+ir*Math.sin(angle),xi2=cx+ir*Math.cos(angle+a),yi2=cy+ir*Math.sin(angle+a);
        const lg=a>Math.PI?1:0;
        const p=`M${xi1},${yi1}L${x1},${y1}A${r},${r} 0 ${lg} 1 ${x2},${y2}L${xi2},${yi2}A${ir},${ir} 0 ${lg} 0 ${xi1},${yi1}Z`;
        angle+=a;
        return <path key={i} d={p} fill={COLORS[i%COLORS.length]}/>;
      })}
      <circle cx={cx} cy={cy} r={ir-1} fill={S.card}/>
    </svg>
  );
}

function LineGraph({holdings,transactions,myrRate,sgdRate}){
  const [range,setRange]=useState("30D");
  const ref=useRef(null);
  const ranges=["7D","30D","3M","6M","1Y","ALL"];
  const getPts=useCallback(()=>{
    const now=new Date();
    const days=range==="7D"?7:range==="30D"?30:range==="3M"?90:range==="6M"?180:range==="1Y"?365:730;
    const pts=[];
    for(let i=days;i>=0;i--){
      const d=new Date(now);d.setDate(d.getDate()-i);
      const ds=d.toISOString().slice(0,10);
      let val=0;const hc={};
      transactions.filter(t=>t.timestamp&&t.timestamp.slice(0,10)<=ds).forEach(t=>{
        const k=t.assetName+"_"+t.currency;
        if(!hc[k]) hc[k]={qty:0,price:t.price,currency:t.currency};
        if(t.type==="BUY"||t.type==="YIELD") hc[k].qty+=t.quantity;
        else if(t.type==="SELL") hc[k].qty=Math.max(0,hc[k].qty-t.quantity);
        hc[k].price=t.price;
      });
      if(Object.keys(hc).length===0) holdings.forEach(h=>{val+=toUSD(h.currentPrice*h.quantity,h.currency,myrRate,sgdRate);});
      else Object.values(hc).forEach(h=>{val+=toUSD(h.price*h.qty,h.currency,myrRate,sgdRate);});
      pts.push({date:ds,value:val});
    }
    return pts;
  },[range,holdings,transactions,myrRate,sgdRate]);

  useEffect(()=>{
    const canvas=ref.current;if(!canvas) return;
    const ctx=canvas.getContext("2d");
    const dpr=window.devicePixelRatio||1;
    const W=canvas.offsetWidth,H=canvas.offsetHeight;
    canvas.width=W*dpr;canvas.height=H*dpr;ctx.scale(dpr,dpr);
    ctx.clearRect(0,0,W,H);
    const pts=getPts();if(!pts.length) return;
    const vals=pts.map(p=>p.value);
    const minV=Math.min(...vals),maxV=Math.max(...vals);
    const pad={top:20,bottom:30,left:58,right:16};
    const gW=W-pad.left-pad.right,gH=H-pad.top-pad.bottom;
    const xOf=i=>pad.left+(i/(pts.length-1))*gW;
    const yOf=v=>pad.top+(maxV===minV?gH/2:(1-(v-minV)/(maxV-minV))*gH);
    ctx.strokeStyle=S.cardBorder;ctx.lineWidth=1;
    for(let j=0;j<=4;j++){
      const y=pad.top+(j/4)*gH;
      ctx.beginPath();ctx.moveTo(pad.left,y);ctx.lineTo(W-pad.right,y);ctx.stroke();
      const v=maxV-(j/4)*(maxV-minV);
      ctx.fillStyle=S.textDim;ctx.font="10px -apple-system,sans-serif";ctx.textAlign="right";
      ctx.fillText("$"+(v>=1000?(v/1000).toFixed(1)+"k":v.toFixed(0)),pad.left-6,y+4);
    }
    const grad=ctx.createLinearGradient(0,pad.top,0,pad.top+gH);
    grad.addColorStop(0,"rgba(50,215,45,0.2)");grad.addColorStop(1,"rgba(50,215,45,0)");
    ctx.beginPath();ctx.moveTo(xOf(0),yOf(pts[0].value));
    pts.forEach((p,i)=>{if(i>0) ctx.lineTo(xOf(i),yOf(p.value));});
    ctx.lineTo(xOf(pts.length-1),pad.top+gH);ctx.lineTo(xOf(0),pad.top+gH);
    ctx.closePath();ctx.fillStyle=grad;ctx.fill();
    ctx.beginPath();ctx.moveTo(xOf(0),yOf(pts[0].value));
    pts.forEach((p,i)=>{if(i>0) ctx.lineTo(xOf(i),yOf(p.value));});
    ctx.strokeStyle=GREEN;ctx.lineWidth=2;ctx.lineJoin="round";ctx.stroke();
    const step=Math.ceil(pts.length/6);
    pts.forEach((p,i)=>{
      if(i%step===0||i===pts.length-1){
        ctx.fillStyle=S.textDim;ctx.font="10px -apple-system,sans-serif";ctx.textAlign="center";
        ctx.fillText(new Date(p.date).toLocaleDateString("en-US",{month:"short",day:"numeric"}),xOf(i),H-8);
      }
    });
  },[getPts]);

  const total=holdings.reduce((s,h)=>s+toUSD(h.currentPrice*h.quantity,h.currency,myrRate,sgdRate),0);
  return(
    <div style={{...card,marginBottom:16}}>
      <div style={{marginBottom:12}}>
        <p style={{margin:0,fontSize:11,color:S.textDim,textTransform:"uppercase",letterSpacing:"0.06em"}}>Portfolio Value</p>
        <p style={{margin:"2px 0 0",fontSize:22,fontWeight:700}}>${total.toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2})}</p>
      </div>
      <canvas ref={ref} style={{width:"100%",height:180,display:"block"}}/>
      <div style={{display:"flex",justifyContent:"center",gap:4,marginTop:12}}>
        {ranges.map(r=><button key={r} onClick={()=>setRange(r)} style={{...bG,padding:"4px 12px",fontSize:12,background:range===r?GREEN_DIM:"transparent",color:range===r?GREEN:S.textDim,border:`1px solid ${range===r?GREEN_BORDER:S.inputBorder}`}}>{r}</button>)}
      </div>
    </div>
  );
}

function TickerField({hForm,setHForm}){
  const isBursa=(hForm.currency==="MYR")&&(hForm.type==="Stocks"||hForm.type==="ETF/Funds");
  const isCrypto=hForm.type==="Crypto";
  const [search,setSearch]=useState(hForm._bursaSearch||"");
  if(isBursa){
    const matches=search?BURSA_STOCKS.filter(s=>s.name.toLowerCase().includes(search.toLowerCase())):[];
    return(
      <div style={{position:"relative"}}>
        <Lbl>Bursa Stock — type name to search</Lbl>
        <input value={search} onChange={e=>{setSearch(e.target.value);setHForm(f=>({...f,ticker:"",_bursaSearch:e.target.value}));}} placeholder="e.g. Maybank, CIMB…" style={iS} autoComplete="off"/>
        {hForm.ticker&&<p style={{margin:"4px 0 0",fontSize:11,color:GREEN}}>✓ {hForm.ticker}</p>}
        {matches.length>0&&!hForm.ticker&&(
          <div style={{position:"absolute",top:"calc(100% + 4px)",left:0,right:0,background:"#1a1a1a",border:`1px solid #2a2a2a`,borderRadius:8,zIndex:99,maxHeight:200,overflowY:"auto"}}>
            {matches.map(s=>(
              <div key={s.ticker} onClick={()=>{setHForm(f=>({...f,ticker:s.ticker,name:f.name||s.name,_bursaSearch:s.name}));setSearch(s.name);}}
                style={{padding:"8px 12px",cursor:"pointer",fontSize:13,display:"flex",justifyContent:"space-between",borderBottom:`1px solid #1e1e1e`}}
                onMouseEnter={e=>e.currentTarget.style.background="#222"}
                onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                <span>{s.name}</span>
                <span style={{color:GREEN,fontFamily:"monospace",fontSize:11}}>{s.ticker}</span>
              </div>
            ))}
          </div>
        )}
      </div>
    );
  }
  return(
    <div>
      <Lbl>{isCrypto?"Ticker (BTC, ETH, SOL…)":"Ticker (AAPL, MSFT, SPY…)"}</Lbl>
      <input value={hForm.ticker||""} onChange={e=>setHForm(f=>({...f,ticker:e.target.value}))} placeholder={isCrypto?"BTC, ETH, SOL…":"AAPL, MSFT, SPY…"} style={iS}/>
    </div>
  );
}

function App(){
  const [tab,setTab]=useState("overview");
  const [holdings,setHoldings]=useState([]);
  const [goals,setGoals]=useState([]);
  const [txs,setTxs]=useState([]);
  const [yields,setYields]=useState([]);
  const [showH,setShowH]=useState(false);
  const [showG,setShowG]=useState(false);
  const [showTx,setShowTx]=useState(false);
  const [showY,setShowY]=useState(false);
  const [hForm,setHForm]=useState(EMPTY_H);
  const [gForm,setGForm]=useState({name:"",target:"",currency:"USD"});
  const [txForm,setTxForm]=useState({type:"BUY",assetName:"",assetType:"Stocks",currency:"USD",price:"",quantity:"",tag:"Growth",note:""});
  const [yForm,setYForm]=useState(EMPTY_Y);
  const [ftType,setFtType]=useState("All");
  const [ftTag,setFtTag]=useState("All");
  const [txFt,setTxFt]=useState("All");
  const [dc,setDc]=useState("USD");
  const [editIdx,setEditIdx]=useState(null);
  const [editTxIdx,setEditTxIdx]=useState(null);
  const [sCol,setSCol]=useState(null);
  const [sDir,setSDir]=useState("desc");
  const [txSCol,setTxSCol]=useState("timestamp");
  const [txSDir,setTxSDir]=useState("desc");
  const [txSub,setTxSub]=useState("manual");
  const [myrRate,setMyrRate]=useState(DEFAULT_MYR);
  const [sgdRate,setSgdRate]=useState(DEFAULT_SGD);
  const [rateUpdated,setRateUpdated]=useState(null);
  const [refreshing,setRefreshing]=useState(false);
  const [lastRefresh,setLastRefresh]=useState(null);
  const [priceChanges,setPriceChanges]=useState({});

  useEffect(()=>{
    try{
      const d=localStorage.getItem(SK);
      if(d){const p=JSON.parse(d);setHoldings(p.holdings||[]);setGoals(p.goals||[]);setTxs(p.txs||[]);setYields(p.yields||[]);setMyrRate(p.myrRate||DEFAULT_MYR);setSgdRate(p.sgdRate||DEFAULT_SGD);setLastRefresh(p.lastRefresh||null);}
    }catch{}
    fetch("https://api.exchangerate-api.com/v4/latest/USD").then(r=>r.json()).then(d=>{
      if(d.rates?.MYR) setMyrRate(d.rates.MYR);
      if(d.rates?.SGD) setSgdRate(d.rates.SGD);
      setRateUpdated(new Date().toLocaleTimeString());
    }).catch(()=>{});
    setYields(prev=>prev.map(y=>{
      if(y.claimed) return y;
      const elapsed=Math.min(Math.max(Math.floor((new Date()-new Date(y.startDate))/86400000),0),y.durationDays);
      const daily=(y.principal*(y.apr/100))/365;
      const totalAccrued=daily*elapsed;
      const newEarnings=totalAccrued-(y.lastAccrued||0);
      if(newEarnings>0.000001){
        setHoldings(prev=>{
          const idx=prev.findIndex(h=>h.name.toLowerCase()===y.rewardAsset.toLowerCase()&&h.currency===y.rewardCurrency);
          if(idx>=0) return prev.map((h,i)=>i===idx?{...h,quantity:h.quantity+newEarnings}:h);
          return[...prev,{name:y.rewardAsset,type:y.rewardAssetType,currency:y.rewardCurrency,purchasePrice:1,currentPrice:1,quantity:newEarnings,tag:y.tag,note:`Auto-accrued: ${y.assetName}`,ticker:""}];
        });
        return{...y,lastAccrued:totalAccrued,totalAccrued};
      }
      return{...y,totalAccrued};
    }));
  },[]);

  useEffect(()=>{try{localStorage.setItem(SK,JSON.stringify({holdings,goals,txs,yields,myrRate,sgdRate,lastRefresh}));}catch{}},[holdings,goals,txs,yields,myrRate,sgdRate,lastRefresh]);

  const cvt=useCallback((a,f)=>{const u=toUSD(a,f,myrRate,sgdRate);return dc==="USD"?u:dc==="MYR"?u*myrRate:u*sgdRate;},[dc,myrRate,sgdRate]);
  const fmt=useCallback((n,c)=>fmtC(n,c||dc),[dc]);

  async function refreshPrices(){
    setRefreshing(true);
    const changes={};
    const upd=[...holdings];
    const cryptoH=upd.filter(h=>h.type==="Crypto"&&h.ticker);
    if(cryptoH.length>0){
      try{
        const listRes=await fetch("https://api.coingecko.com/api/v3/coins/list");
        const coinList=await listRes.json();
        const symMap={};
        coinList.forEach(c=>{const sym=c.symbol.toLowerCase();if(!symMap[sym]) symMap[sym]=c.id;});
        Object.assign(symMap,CRYPTO_MAP);
        const ids=cryptoH.map(h=>symMap[h.ticker.toLowerCase()]||h.ticker.toLowerCase()).join(",");
        const r=await fetch(`https://api.coingecko.com/api/v3/simple/price?ids=${ids}&vs_currencies=usd`);
        const data=await r.json();
        cryptoH.forEach(h=>{
          const cgId=symMap[h.ticker.toLowerCase()]||h.ticker.toLowerCase();
          const price=data[cgId]?.usd;
          if(price){const idx=upd.findIndex(x=>x.name===h.name&&x.currency===h.currency);const old=upd[idx].currentPrice;changes[h.name]={old,new:price,diff:((price-old)/old)*100};upd[idx]={...upd[idx],currentPrice:price};}
        });
      }catch(e){console.error("CoinGecko",e);}
    }
    const stockH=upd.filter(h=>(h.type==="Stocks"||h.type==="ETF/Funds")&&h.ticker);
    for(const h of stockH){
      try{
        const r=await fetch(`https://finnhub.io/api/v1/quote?symbol=${h.ticker.toUpperCase()}&token=${FINNHUB_KEY}`);
        const data=await r.json();
        if(data.c&&data.c>0){const idx=upd.findIndex(x=>x.name===h.name&&x.currency===h.currency);const old=upd[idx].currentPrice;changes[h.name]={old,new:data.c,diff:((data.c-old)/old)*100};upd[idx]={...upd[idx],currentPrice:data.c};}
      }catch(e){console.error("Finnhub",h.ticker,e);}
    }
    try{
      const r=await fetch("https://api.exchangerate-api.com/v4/latest/USD");
      const data=await r.json();
      if(data.rates?.MYR) setMyrRate(data.rates.MYR);
      if(data.rates?.SGD) setSgdRate(data.rates.SGD);
      setRateUpdated(new Date().toLocaleTimeString());
    }catch{}
    setHoldings(upd);setPriceChanges(changes);
    setLastRefresh(new Date().toLocaleString());setRefreshing(false);
  }

  const tv=holdings.reduce((s,h)=>s+cvt(h.currentPrice*h.quantity,h.currency),0);
  const tc=holdings.reduce((s,h)=>s+cvt(h.purchasePrice*h.quantity,h.currency),0);
  const tgl=tv-tc,tglp=tc>0?(tgl/tc)*100:0;
  const byType=ASSET_TYPES.map((t,i)=>({label:t,color:COLORS[i],value:holdings.filter(h=>h.type===t).reduce((s,h)=>s+cvt(h.currentPrice*h.quantity,h.currency),0)})).filter(d=>d.value>0);

  function srtH(col){if(sCol===col)setSDir(d=>d==="asc"?"desc":"asc");else{setSCol(col);setSDir("desc");}}
  function si(col){return sCol!==col?<span style={{color:S.textFaint}}> ↕</span>:<span style={{color:GREEN}}>{sDir==="asc"?" ↑":" ↓"}</span>;}
  function srtTx(col){if(txSCol===col)setTxSDir(d=>d==="asc"?"desc":"asc");else{setTxSCol(col);setTxSDir("desc");}}
  function tsi(col){return txSCol!==col?<span style={{color:S.textFaint}}> ↕</span>:<span style={{color:GREEN}}>{txSDir==="asc"?" ↑":" ↓"}</span>;}

  const filtered=holdings.filter(h=>(ftType==="All"||h.type===ftType)&&(ftTag==="All"||h.tag===ftTag));
  const sorted=[...filtered].sort((a,b)=>{
    if(!sCol) return 0;
    const gv=x=>{
      if(sCol==="name") return x.name.toLowerCase();
      if(sCol==="type") return x.type;
      if(sCol==="tag") return x.tag;
      if(sCol==="qty") return x.quantity;
      if(sCol==="value") return cvt(x.currentPrice*x.quantity,x.currency);
      if(sCol==="share") return tv>0?cvt(x.currentPrice*x.quantity,x.currency)/tv*100:0;
      if(sCol==="gl") return cvt(x.currentPrice*x.quantity,x.currency)-cvt(x.purchasePrice*x.quantity,x.currency);
      if(sCol==="glp"){const c2=cvt(x.purchasePrice*x.quantity,x.currency);return c2>0?(cvt(x.currentPrice*x.quantity,x.currency)-c2)/c2*100:0;}
      return 0;
    };
    const av=gv(a),bv=gv(b);
    if(av<bv) return sDir==="asc"?-1:1;if(av>bv) return sDir==="asc"?1:-1;return 0;
  });

  const filteredTx=txs.filter(t=>txFt==="All"||t.assetType===txFt);
  const sortedTx=[...filteredTx].sort((a,b)=>{
    let av,bv;
    if(txSCol==="timestamp"){av=a.timestamp;bv=b.timestamp;}
    else if(txSCol==="assetName"){av=a.assetName?.toLowerCase();bv=b.assetName?.toLowerCase();}
    else if(txSCol==="type"){av=a.type;bv=b.type;}
    else if(txSCol==="assetType"){av=a.assetType;bv=b.assetType;}
    else if(txSCol==="quantity"){av=a.quantity;bv=b.quantity;}
    else if(txSCol==="price"){av=a.price;bv=b.price;}
    else if(txSCol==="total"){av=a.price*a.quantity;bv=b.price*b.quantity;}
    if(av<bv) return txSDir==="asc"?-1:1;if(av>bv) return txSDir==="asc"?1:-1;return 0;
  });

  function saveH(){
    const h={...hForm,purchasePrice:parseFloat(hForm.purchasePrice)||0,currentPrice:parseFloat(hForm.currentPrice)||0,quantity:parseFloat(hForm.quantity)||0};
    delete h._bursaSearch;

    if(editIdx!==null){setHoldings(p=>p.map((x,i)=>i===editIdx?h:x));setEditIdx(null);}
    else setHoldings(p=>[...p,h]);
    setHForm(EMPTY_H);setShowH(false);
  }
  function startEditH(i){const h=holdings[i];setHForm({...h,purchasePrice:String(h.purchasePrice),currentPrice:String(h.currentPrice),quantity:String(h.quantity),_bursaSearch:h.ticker?.startsWith("KLSE:")?BURSA_STOCKS.find(b=>b.ticker===h.ticker)?.name||"":""});setEditIdx(i);setShowH(true);}
  function saveG(){if(!gForm.name||!gForm.target) return;setGoals(p=>[...p,{...gForm,target:parseFloat(gForm.target)}]);setGForm({name:"",target:"",currency:"USD"});setShowG(false);}

  function commitTx(){
    const price=parseFloat(txForm.price)||0,qty=parseFloat(txForm.quantity)||0;
    if(!txForm.assetName||!price||!qty) return;
    if(editTxIdx!==null){setTxs(p=>p.map((x,i)=>i===editTxIdx?{...txForm,price,quantity:qty,timestamp:x.timestamp,id:x.id}:x));setEditTxIdx(null);}
    else{
      setTxs(p=>[{...txForm,price,quantity:qty,timestamp:new Date().toISOString(),id:Date.now()},...p]);
      setHoldings(prev=>{
        const idx=prev.findIndex(h=>h.name.toLowerCase()===txForm.assetName.toLowerCase()&&h.currency===txForm.currency);
        if(txForm.type==="BUY"){
          if(idx>=0){const h=prev[idx],tq=h.quantity+qty,ap=(h.purchasePrice*h.quantity+price*qty)/tq;return prev.map((x,i)=>i===idx?{...x,quantity:tq,purchasePrice:ap,currentPrice:price}:x);}
          return[...prev,{name:txForm.assetName,type:txForm.assetType,currency:txForm.currency,purchasePrice:price,currentPrice:price,quantity:qty,tag:txForm.tag,note:txForm.note,ticker:""}];
        }else{
          if(idx>=0){const nq=prev[idx].quantity-qty;if(nq<=0) return prev.filter((_,i)=>i!==idx);return prev.map((x,i)=>i===idx?{...x,quantity:nq,currentPrice:price}:x);}
          return prev;
        }
      });
    }
    setTxForm({type:"BUY",assetName:"",assetType:"Stocks",currency:"USD",price:"",quantity:"",tag:"Growth",note:""});setShowTx(false);
  }
  function startEditTx(i){const t=sortedTx[i];const oi=txs.findIndex(x=>x.id===t.id);setTxForm({...t,price:String(t.price),quantity:String(t.quantity)});setEditTxIdx(oi);setShowTx(true);}
  function deleteTx(i){const t=sortedTx[i];setTxs(p=>p.filter(x=>x.id!==t.id));}

  function addYield(){
    const y={...yForm,principal:parseFloat(yForm.principal)||0,apr:parseFloat(yForm.apr)||0,durationDays:parseInt(yForm.durationDays)||0,id:Date.now(),lastAccrued:0,totalAccrued:0,claimed:false};
    if(!y.assetName||!y.principal||!y.apr||!y.durationDays||!y.rewardAsset) return;
    setYields(p=>[y,...p]);setYForm(EMPTY_Y);setShowY(false);
  }
  function claimYield(i){
    const y=yields[i];const daily=(y.principal*(y.apr/100))/365;
    const elapsed=Math.min(Math.max(Math.floor((new Date()-new Date(y.startDate))/86400000),0),y.durationDays);
    setTxs(p=>[{type:"YIELD",assetName:y.rewardAsset,assetType:y.rewardAssetType,currency:y.rewardCurrency,price:1,quantity:daily*elapsed,tag:y.tag,note:`Claimed: ${y.assetName} @ ${y.apr}% APR`,timestamp:new Date().toISOString(),id:Date.now()},...p]);
    setYields(p=>p.map((x,j)=>j===i?{...x,claimed:true,claimedAt:new Date().toISOString()}:x));
  }
  function yStats(y){
    const elapsed=Math.min(Math.max(Math.floor((new Date()-new Date(y.startDate))/86400000),0),y.durationDays);
    const daily=(y.principal*(y.apr/100))/365;
    return{elapsed,remaining:y.durationDays-elapsed,daily,totalProjected:daily*y.durationDays,accrued:daily*elapsed,progress:(elapsed/y.durationDays)*100};
  }

  function dl(rows,name){const a=document.createElement("a");a.href="data:text/csv;charset=utf-8,"+encodeURIComponent(rows.map(r=>r.join(",")).join("\n"));a.download=name;a.click();}
  function exportCSV(){dl([["Name","Type","Tag","Currency","Ticker","Purchase Price","Current Price","Quantity","Current Value","Gain/Loss","G/L %","Portfolio Share"],...holdings.map(h=>{const v=cvt(h.currentPrice*h.quantity,h.currency),c2=cvt(h.purchasePrice*h.quantity,h.currency),gl=v-c2,sh=tv>0?(v/tv*100).toFixed(2):0;return[h.name,h.type,h.tag,h.currency,h.ticker||"",h.purchasePrice,h.currentPrice,h.quantity,v.toFixed(2),gl.toFixed(2),(c2>0?(gl/c2*100).toFixed(2):0)+"%",sh+"%"];})],"portfolio.csv");}
  function importCSV(e){const file=e.target.files[0];if(!file) return;const r=new FileReader();r.onload=ev=>{const rows=ev.target.result.split("\n").filter(l=>l.trim()).slice(1).map(l=>l.split(","));const imp=rows.map(r=>({name:r[0]?.trim(),type:r[1]?.trim(),tag:r[2]?.trim(),currency:r[3]?.trim(),ticker:r[4]?.trim()||"",purchasePrice:parseFloat(r[5])||0,currentPrice:parseFloat(r[6])||0,quantity:parseFloat(r[7])||0,note:""})).filter(h=>h.name);if(imp.length>0){setHoldings(imp);alert(`✅ ${imp.length} holdings imported`);}else alert("No valid holdings found.");};r.readAsText(file);e.target.value="";}

              💡 Add a ticker to enable live prices. <strong>US Stocks/ETFs</strong>: AAPL, TSLA · <strong>Bursa</strong>: search by name (MYR + Stocks) · <strong>Crypto</strong>: BTC, ETH, SOL

      {tab==="transactions"&&(
        <div>
          <div style={{display:"flex",gap:2,marginBottom:20,background:S.card,borderRadius:10,padding:4,border:`1px solid ${S.cardBorder}`,width:"fit-content"}}>
            {[["manual","Manual Trades"],["yields","Yield / Staking"]].map(([id,label])=>(
              <button key={id} onClick={()=>setTxSub(id)} style={{padding:"7px 18px",fontSize:13,background:txSub===id?GREEN_DIM:"transparent",color:txSub===id?GREEN:S.textDim,border:`1px solid ${txSub===id?GREEN_BORDER:"transparent"}`,borderRadius:8,cursor:"pointer",fontWeight:txSub===id?600:400,fontFamily:"inherit"}}>{label}</button>
            ))}
          </div>
          {txSub==="manual"&&(
            <div>
              <div style={{display:"flex",gap:8,marginBottom:16,flexWrap:"wrap",alignItems:"center"}}>
                <select value={txFt} onChange={e=>setTxFt(e.target.value)} style={{...iS,width:"auto"}}><option value="All">All types</option>{ASSET_TYPES.map(t=><option key={t}>{t}</option>)}</select>
                <div style={{flex:1}}/>
                <button onClick={exportTxCSV} style={bG}>⬇ Export</button>
                <label style={{...bG,display:"inline-block",cursor:"pointer"}}>⬆ Import<input type="file" accept=".csv" style={{display:"none"}} onChange={importTxCSV}/></label>
                <button onClick={()=>{setTxForm({type:"BUY",assetName:"",assetType:"Stocks",currency:"USD",price:"",quantity:"",tag:"Growth",note:""});setEditTxIdx(null);setShowTx(true);}} style={bP}>+ New transaction</button>
              </div>
              {showTx&&(
                <div style={{...card,marginBottom:16}}>
                  <p style={{margin:"0 0 14px",fontWeight:600,fontSize:14}}>{editTxIdx!==null?"Edit Transaction":"New Transaction"}</p>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
                    <div><Lbl>Transaction type</Lbl><select value={txForm.type} onChange={e=>setTxForm(f=>({...f,type:e.target.value}))} style={iS}><option value="BUY">BUY</option><option value="SELL">SELL</option></select></div>
                    <div><Lbl>Asset name</Lbl><input value={txForm.assetName} onChange={e=>setTxForm(f=>({...f,assetName:e.target.value}))} list="hnames" style={iS}/><datalist id="hnames">{holdings.map(h=><option key={h.name} value={h.name}/>)}</datalist></div>
                    <div><Lbl>Asset type</Lbl><select value={txForm.assetType} onChange={e=>setTxForm(f=>({...f,assetType:e.target.value}))} style={iS}>{ASSET_TYPES.map(t=><option key={t}>{t}</option>)}</select></div>
                    <div><Lbl>Currency</Lbl><select value={txForm.currency} onChange={e=>setTxForm(f=>({...f,currency:e.target.value}))} style={iS}>{CURRENCIES.map(c=><option key={c}>{c}</option>)}</select></div>
                    <div><Lbl>Price per unit ({txForm.currency})</Lbl><input type="number" value={txForm.price} onChange={e=>setTxForm(f=>({...f,price:e.target.value}))} style={iS}/></div>
                    <div><Lbl>Quantity</Lbl><input type="number" value={txForm.quantity} onChange={e=>setTxForm(f=>({...f,quantity:e.target.value}))} style={iS}/></div>
                    <div><Lbl>Tag</Lbl><select value={txForm.tag} onChange={e=>setTxForm(f=>({...f,tag:e.target.value}))} style={iS}>{TAGS.map(t=><option key={t}>{t}</option>)}</select></div>
                    <div><Lbl>Note (optional)</Lbl><input value={txForm.note} onChange={e=>setTxForm(f=>({...f,note:e.target.value}))} style={iS}/></div>
                  </div>
                  {txForm.price&&txForm.quantity&&<div style={{marginTop:12,padding:"10px 14px",background:GREEN_DIM,border:`1px solid ${GREEN_BORDER}`,borderRadius:8,fontSize:13}}>Total: <strong style={{color:GREEN}}>{fmtC(parseFloat(txForm.price||0)*parseFloat(txForm.quantity||0),txForm.currency)}</strong></div>}
                  <div style={{display:"flex",gap:8,marginTop:14}}>
                    <button onClick={commitTx} style={txForm.type==="BUY"?bP:bD}>Confirm {txForm.type}</button>
                    <button onClick={()=>{setShowTx(false);setEditTxIdx(null);}} style={bG}>Cancel</button>
                  </div>
                </div>
              )}
              {sortedTx.length===0?<p style={{color:S.textDim,fontSize:13}}>No transactions yet.</p>:(
                <div style={{overflowX:"auto"}}>
                  <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
                    <thead>
                      <tr style={{borderBottom:`1px solid ${S.cardBorder}`}}>
                        {[["timestamp","Date/Time",true],["type","Type"],["assetName","Asset",true],["assetType","Category"],["price","Price"],["quantity","Qty"],["total","Total"]].map(([col,label,left])=>(
                          <th key={col} onClick={()=>srtTx(col)} style={{...thS(),textAlign:left?"left":"right",color:txSCol===col?S.text:S.textDim}}>{label}{tsi(col)}</th>
                        ))}
                        <th style={{...thS()}}>Note</th>
                        <th style={{padding:"10px 8px"}}></th>
                      </tr>
                    </thead>
                    <tbody>
                      {sortedTx.map((t,i)=>(
                        <tr key={t.id||i} style={{borderBottom:`1px solid ${S.cardBorder}`}}>
                          <td style={{padding:"10px 8px",fontSize:12,color:S.textDim,whiteSpace:"nowrap"}}>{new Date(t.timestamp).toLocaleString()}</td>
                          <td style={{padding:"10px 8px",textAlign:"right"}}><span style={{fontSize:11,padding:"2px 10px",borderRadius:99,fontWeight:600,background:t.type==="BUY"?GREEN_DIM:t.type==="YIELD"?"rgba(10,132,255,0.12)":"rgba(255,69,58,0.12)",color:t.type==="BUY"?GREEN:t.type==="YIELD"?BLUE:RED}}>{t.type}</span></td>
                          <td style={{padding:"10px 8px",fontWeight:600}}>{t.assetName}</td>
                          <td style={{padding:"10px 8px",textAlign:"right",color:S.textDim,fontSize:12}}>{t.assetType}</td>
                          <td style={{padding:"10px 8px",textAlign:"right",fontFamily:"monospace"}}>{fmtC(t.price,t.currency)}</td>
                          <td style={{padding:"10px 8px",textAlign:"right",fontFamily:"monospace"}}>{t.quantity}</td>
                          <td style={{padding:"10px 8px",textAlign:"right",fontWeight:600}}>{fmtC(t.price*t.quantity,t.currency)}</td>
                          <td style={{padding:"10px 8px",fontSize:12,color:S.textDim,maxWidth:120,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{t.note||"—"}</td>
                          <td style={{padding:"10px 8px",textAlign:"right",whiteSpace:"nowrap"}}>
                            <button onClick={()=>startEditTx(i)} style={{background:"none",border:"none",cursor:"pointer",padding:"4px 6px",color:S.textDim,fontSize:14}}>✎</button>
                            <button onClick={()=>deleteTx(i)} style={{background:"none",border:"none",cursor:"pointer",padding:"4px 6px",color:S.textDim,fontSize:14}}>🗑</button>
                          </td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              )}
            </div>
          )}
          {txSub==="yields"&&(
            <div>
              <div style={{display:"flex",justifyContent:"flex-end",marginBottom:16}}>
                <button onClick={()=>setShowY(true)} style={bP}>+ New yield / staking</button>
              </div>
              {showY&&(
                <div style={{...card,marginBottom:20}}>
                  <p style={{margin:"0 0 14px",fontWeight:600,fontSize:14}}>New Yield / Staking Schedule</p>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
                    <div><Lbl>Platform / Asset name</Lbl><input value={yForm.assetName} onChange={e=>setYForm(f=>({...f,assetName:e.target.value}))} style={iS}/></div>
                    <div><Lbl>Principal amount</Lbl><input type="number" value={yForm.principal} onChange={e=>setYForm(f=>({...f,principal:e.target.value}))} style={iS}/></div>
                    <div><Lbl>Principal currency</Lbl><select value={yForm.currency} onChange={e=>setYForm(f=>({...f,currency:e.target.value}))} style={iS}>{CURRENCIES.map(c=><option key={c}>{c}</option>)}</select></div>
                    <div><Lbl>APR (%)</Lbl><input type="number" value={yForm.apr} onChange={e=>setYForm(f=>({...f,apr:e.target.value}))} style={iS}/></div>
                    <div><Lbl>Duration (days)</Lbl><input type="number" value={yForm.durationDays} onChange={e=>setYForm(f=>({...f,durationDays:e.target.value}))} style={iS}/></div>
                    <div><Lbl>Start date</Lbl><input type="date" value={yForm.startDate} onChange={e=>setYForm(f=>({...f,startDate:e.target.value}))} style={iS}/></div>
                    <div><Lbl>Reward asset name</Lbl><input value={yForm.rewardAsset} onChange={e=>setYForm(f=>({...f,rewardAsset:e.target.value}))} list="hnames2" style={iS}/><datalist id="hnames2">{holdings.map(h=><option key={h.name} value={h.name}/>)}</datalist></div>
                    <div><Lbl>Reward asset type</Lbl><select value={yForm.rewardAssetType} onChange={e=>setYForm(f=>({...f,rewardAssetType:e.target.value}))} style={iS}>{ASSET_TYPES.map(t=><option key={t}>{t}</option>)}</select></div>
                    <div><Lbl>Reward currency</Lbl><select value={yForm.rewardCurrency} onChange={e=>setYForm(f=>({...f,rewardCurrency:e.target.value}))} style={iS}>{CURRENCIES.map(c=><option key={c}>{c}</option>)}</select></div>
                    <div><Lbl>Tag</Lbl><select value={yForm.tag} onChange={e=>setYForm(f=>({...f,tag:e.target.value}))} style={iS}>{TAGS.map(t=><option key={t}>{t}</option>)}</select></div>
                    <div style={{gridColumn:"1/-1"}}><Lbl>Note (optional)</Lbl><input value={yForm.note} onChange={e=>setYForm(f=>({...f,note:e.target.value}))} style={iS}/></div>
                  </div>
                  {yForm.principal&&yForm.apr&&yForm.durationDays&&(
                    <div style={{marginTop:12,padding:"12px 14px",background:GREEN_DIM,border:`1px solid ${GREEN_BORDER}`,borderRadius:8,display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:12}}>
                      {[["Daily earnings",fmtC((parseFloat(yForm.principal)*(parseFloat(yForm.apr)/100))/365,yForm.currency)],["Total projected",fmtC((parseFloat(yForm.principal)*(parseFloat(yForm.apr)/100))/365*parseInt(yForm.durationDays||0),yForm.currency)],["Effective rate",((parseFloat(yForm.apr)/365)*parseInt(yForm.durationDays||0)).toFixed(4)+"%"]].map(([l,v])=>(
                        <div key={l}><p style={{margin:"0 0 2px",fontSize:11,color:S.textDim}}>{l}</p><p style={{margin:0,fontWeight:600,color:GREEN}}>{v}</p></div>
                      ))}
                    </div>
                  )}
                  <div style={{display:"flex",gap:8,marginTop:14}}>
                    <button onClick={addYield} style={bP}>Start yield</button>
                    <button onClick={()=>setShowY(false)} style={bG}>Cancel</button>
                  </div>
                </div>
              )}
              {yields.length===0?<p style={{color:S.textDim,fontSize:13}}>No yield schedules yet.</p>
                :yields.map((y,i)=>{
                  const{elapsed,remaining,daily,totalProjected,accrued,progress}=yStats(y);
                  const isExp=remaining<=0&&!y.claimed;
                  const sc=y.claimed?S.textDim:isExp?RED:GREEN;
                  return(
                    <div key={y.id||i} style={{...card,marginBottom:12,opacity:y.claimed?0.6:1,borderLeft:`3px solid ${sc}`}}>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:14}}>
                        <div>
                          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
                            <p style={{margin:0,fontWeight:700,fontSize:15}}>{y.assetName}</p>
                            <span style={{fontSize:11,padding:"2px 10px",borderRadius:99,fontWeight:600,background:y.claimed?"rgba(255,255,255,0.06)":isExp?"rgba(255,69,58,0.12)":GREEN_DIM,color:sc}}>{y.claimed?"Claimed":isExp?"Expired":"Active"}</span>
                          </div>
                          <p style={{margin:0,fontSize:12,color:S.textDim}}>{fmtC(y.principal,y.currency)} @ {y.apr}% APR · Reward → <span style={{color:GREEN}}>{y.rewardAsset}</span> · {y.durationDays} days</p>
                        </div>
                        {!y.claimed&&<button onClick={()=>claimYield(i)} style={isExp?bD:bP}>{isExp?"Claim & Close":"Claim early"}</button>}
                      </div>
                      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10,marginBottom:12}}>
                        {[["Daily Earnings",fmtC(daily,y.currency)],["Accrued So Far",fmtC(accrued,y.currency)],["Total Projected",fmtC(totalProjected,y.currency)],["Days Remaining",y.claimed?"—":`${remaining} / ${y.durationDays}`]].map(([l,v])=>(
                          <div key={l} style={{background:S.bg,borderRadius:8,padding:"10px 12px",border:`1px solid ${S.cardBorder}`}}>
                            <p style={{margin:"0 0 4px",fontSize:10,color:S.textDim,textTransform:"uppercase",letterSpacing:"0.06em"}}>{l}</p>
                            <p style={{margin:0,fontSize:14,fontWeight:600,color:l==="Accrued So Far"?GREEN:S.text}}>{v}</p>
                          </div>
                        ))}
                      </div>
                      {!y.claimed&&(
                        <div>
                          <div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:S.textDim,marginBottom:6}}><span>Day {elapsed} of {y.durationDays}</span><span>{progress.toFixed(1)}%</span></div>
                          <div style={{height:4,background:S.inputBorder,borderRadius:99,overflow:"hidden"}}>
                            <div style={{width:progress+"%",height:"100%",background:isExp?RED:GREEN,borderRadius:99,boxShadow:`0 0 8px ${isExp?RED:GREEN}`}}/>
                          </div>
                        </div>
                      )}
                      {y.claimed&&<p style={{fontSize:12,color:S.textDim,marginTop:4}}>Claimed on {new Date(y.claimedAt).toLocaleString()}</p>}
                    </div>
                  );
                })}
            </div>
          )}
        </div>
      )}

      {/* GOALS */}
      {tab==="goals"&&(
        <div>
          <div style={{display:"flex",justifyContent:"flex-end",marginBottom:16}}>
            <button onClick={()=>setShowG(true)} style={bP}>+ Add goal</button>
          </div>
          {showG&&(
            <div style={{...card,marginBottom:16}}>
              <p style={{margin:"0 0 14px",fontWeight:600,fontSize:14}}>New Goal</p>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:12}}>
                <div><Lbl>Goal name</Lbl><input value={gForm.name} onChange={e=>setGForm(f=>({...f,name:e.target.value}))} style={iS}/></div>
                <div><Lbl>Target amount</Lbl><input type="number" value={gForm.target} onChange={e=>setGForm(f=>({...f,target:e.target.value}))} style={iS}/></div>
                <div><Lbl>Currency</Lbl><select value={gForm.currency} onChange={e=>setGForm(f=>({...f,currency:e.target.value}))} style={iS}>{CURRENCIES.map(c=><option key={c}>{c}</option>)}</select></div>
              </div>
              <div style={{display:"flex",gap:8,marginTop:14}}>
                <button onClick={saveG} style={bP}>Save</button>
                <button onClick={()=>setShowG(false)} style={bG}>Cancel</button>
              </div>
            </div>
          )}
          {goals.length===0?<p style={{color:S.textDim,fontSize:13}}>No goals yet.</p>
            :goals.map((g,i)=>{
              const cur=cvt(tv,"USD"),tgt=g.currency===dc?g.target:g.currency==="USD"?cvt(g.target,"USD"):g.currency==="MYR"?cvt(g.target,"MYR"):cvt(g.target,"SGD");
              const p=Math.min((cur/tgt)*100,100);
              return(
                <div key={i} style={{...card,marginBottom:12,borderLeft:`3px solid ${p>=100?GREEN:BLUE}`}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
                    <div>
                      <p style={{margin:0,fontWeight:700,fontSize:15}}>{g.name}</p>
                      <p style={{margin:0,fontSize:12,color:S.textDim,marginTop:2}}>Target: {fmtC(tgt,dc)} · Current: {fmtC(cur,dc)}</p>
                    </div>
                    <div style={{display:"flex",alignItems:"center",gap:10}}>
                      <span style={{fontSize:20,fontWeight:700,color:p>=100?GREEN:S.text}}>{p.toFixed(1)}%</span>
                      <button onClick={()=>setGoals(p=>p.filter((_,j)=>j!==i))} style={{background:"none",border:"none",cursor:"pointer",color:S.textDim,fontSize:14}}>🗑</button>
                    </div>
                  </div>
                  <div style={{height:6,background:S.inputBorder,borderRadius:99,overflow:"hidden"}}>
                    <div style={{width:p+"%",height:"100%",background:p>=100?GREEN:BLUE,borderRadius:99,boxShadow:`0 0 10px ${p>=100?GREEN:BLUE}`}}/>
                  </div>
                </div>
              );
            })}
          <div style={{marginTop:20,padding:"12px 14px",background:S.card,borderRadius:8,border:`1px solid ${S.cardBorder}`,fontSize:12,color:S.textDim}}>
            ℹ Goal progress based on total portfolio value ({fmtC(tv,dc)}). Live rates: 1 USD = {myrRate.toFixed(4)} MYR · {sgdRate.toFixed(4)} SGD{rateUpdated?` (updated ${rateUpdated})`:""}.
          </div>
        </div>
      )}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
